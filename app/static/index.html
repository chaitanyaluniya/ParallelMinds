<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParallelMinds Agent</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>ParallelMinds</h1>
      <p class="subtitle">Multi-modal agent — text, images, PDFs, audio</p>
    </header>

    <main class="chat-container">
      <section id="messages" class="messages" aria-live="polite"></section>

      <section id="extracted-panel" class="panel hidden">
        <h2>Extracted Content</h2>
        <pre id="extracted-text"></pre>
      </section>

      <section id="plan-panel" class="panel hidden">
        <h2>Agent Plan Trace</h2>
        <ol id="plan-trace"></ol>
      </section>
    </main>

    <footer class="input-area">
      <form id="chat-form">
        <div class="file-row">
          <label for="files" class="file-label">Attach files (image, PDF, audio)</label>
          <input
            type="file"
            id="files"
            name="files"
            multiple
            accept="image/jpeg,image/png,application/pdf,audio/mpeg,audio/wav,audio/mp4,audio/x-m4a"
          />
          <span id="file-names" class="file-names"></span>
        </div>
        <div class="query-row">
          <textarea
            id="query"
            name="query"
            rows="2"
            placeholder="Ask anything — upload files and type your query..."
          ></textarea>
          <button type="submit" id="submit-btn">Send</button>
        </div>
      </form>
    </footer>
  </div>
  <script src="/js/app.js"></script>
</body>
</html>
