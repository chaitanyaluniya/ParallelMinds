services:
  - type: web
    name: parallelminds
    runtime: docker
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: GROQ_WHISPER_MODEL
        value: whisper-large-v3
      - key: MAX_FILE_MB
        value: 25
      - key: MAX_AUDIO_MB
        value: 25
      - key: MAX_AUDIO_SEC
        value: 600
      - key: CORS_ORIGINS
        value: https://parallelminds.onrender.com,http://localhost:5173
