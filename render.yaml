services:
  - type: web
    name: parallelminds-agent
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_VISION_MODEL
        value: llama-3.2-11b-vision-preview
      - key: GROQ_WHISPER_MODEL
        value: whisper-large-v3
      - key: CORS_ORIGINS
        value: https://your-frontend.onrender.com,http://localhost:5173
