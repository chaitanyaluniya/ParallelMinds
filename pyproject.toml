[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["backend"]
python_files = ["test_*.py", "cases.py"]
python_functions = ["test_*", "tc1", "tc2", "tc3", "tc3b", "tc4", "tc4b", "tc5", "rule_yt", "rule_doc_q", "rule_code", "fmt", "test_trim", "test_mem", "test_pending", "test_no_loop", "test_rag"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
